<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CIZXO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* VIDEO BACKGROUND */
.video-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: -1;
}

/* DARK OVERLAY (makes text readable) */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
    z-index: 0;
}

/* CENTER CONTENT */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 1;
    position: relative;
    font-family: 'Orbitron', sans-serif;
}

.text-group {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* MAIN TEXT */
h1 {
    font-size: 30px;
    letter-spacing: 5px;
    color: #ffffff;

    text-shadow:
        0 2px 6px rgba(0,0,0,0.7),
        0 0 10px rgba(255,255,255,0.5),
        0 0 25px rgba(180,180,255,0.3);

    animation: float 4s ease-in-out infinite;
}

/* SUB TEXT */
p {
    margin-top: 10px;
    font-size: 15px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.75);

    text-shadow:
        0 2px 6px rgba(0,0,0,0.7);

    animation: float 4s ease-in-out infinite;
}

/* SIMPLE FLOAT ANIMATION */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-4px); }
    100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video class="video-bg" autoplay muted loop playsinline>
    <source src="background.mp4" type="video/mp4">
</video>

<!-- DARK OVERLAY -->
<div class="overlay"></div>

<!-- TEXT -->
<div class="container">
    <div class="text-group">
        <h1>CIZXO</h1>
        <p>chill and listen.</p>
    </div>
</div>

</body>
</html>
